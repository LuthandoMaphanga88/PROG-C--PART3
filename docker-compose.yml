services:
  # Container 1: SQL Server Database
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: techmove-sqlserver
    environment:
      SA_PASSWORD: "TechMove2024Secure@1"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - techmove-network

  # Container 2: Backend API (Techmove.API)
  glms-backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: techmove-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechmoveDB;User Id=sa;Password=TechMove2024Secure@1;TrustServerCertificate=true;"
    ports:
      - "7053:7053"
    networks:
      - techmove-network
    restart: unless-stopped

  # Container 3: Frontend Web (Techmove MVC)
  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: techmove-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      TechmoveApi__BaseUrl: "http://glms-backend-api:7053/"
    ports:
      - "7054:7054"
    networks:
      - techmove-network
    restart: unless-stopped

networks:
  techmove-network:
    driver: bridge

volumes:
  sqlserver_data:
